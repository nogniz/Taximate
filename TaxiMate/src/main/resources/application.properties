server.port=${PORT:8080}
server.address=0.0.0.0

# H2 데이터베이스 연결 설정
spring.datasource.url=jdbc:h2:mem:taximatedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 하이버네이트 설정 (서버 켤 때 테이블 자동 생성 및 쿼리 로그 출력)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 DB를 눈으로 볼 수 있는 웹 콘솔 활성화
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# ✉️ Brevo Transactional Email API (Railway SMTP 차단 우회, 누구에게나 발송 가능)
brevo.api.key=${BREVO_API_KEY:placeholder}